# Mail-Endpoint für die Digital-Long-View-Homepage (Kontaktformular + Funnel).
#
# Läuft im k3s-Cluster (ns `web`) neben dem statischen `dlv-web`-Deployment.
# Ein schlanker php:8.3-cli-Pod serviert NUR /api/contact.php (PHP eingebauter
# Server). Er mountet denselben hostPath wie dlv-web (/var/www/dlv-homepage),
# also kommt contact.php über den normalen Homepage-Deploy mit. Die SMTP-Config
# liegt als Secret (dlv-mail-config) AUSSERHALB des Docroots unter /cfg und wird
# per CONTACT_CONFIG referenziert — so landet kein Secret im statisch
# ausgelieferten Verzeichnis.
#
# Versand: interner openDesk-Postfix-Relay (postfix-smtp.opendesk:25). Das
# Pod-Netz (10.42.0.0/24) liegt in postfix `mynetworks` (10.0.0.0/8) →
# permit_mynetworks → Relay ohne Login, ausgehend DKIM-signiert.
#
# Das Secret wird NICHT hier eingecheckt (enthält die SMTP-Zielkonfiguration),
# sondern auf dem Server erzeugt — siehe deploy/k8s/README.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dlv-mail
  namespace: web
  labels: { app: dlv-mail }
spec:
  replicas: 1
  selector: { matchLabels: { app: dlv-mail } }
  template:
    metadata: { labels: { app: dlv-mail } }
    spec:
      automountServiceAccountToken: false
      securityContext: { runAsNonRoot: true, runAsUser: 33, runAsGroup: 33 }
      containers:
        - name: php
          image: php:8.3-cli
          command: ["php", "-S", "0.0.0.0:8080", "-t", "/app"]
          workingDir: /app
          ports: [{ containerPort: 8080 }]
          env:
            - { name: CONTACT_CONFIG, value: /cfg/contact.config.php }
          volumeMounts:
            - { name: site, mountPath: /app, readOnly: true }
            - { name: mailcfg, mountPath: /cfg, readOnly: true }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 250m, memory: 128Mi }
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: site
          hostPath: { path: /var/www/dlv-homepage, type: Directory }
        - name: mailcfg
          secret: { secretName: dlv-mail-config }
---
apiVersion: v1
kind: Service
metadata:
  name: dlv-mail
  namespace: web
  labels: { app: dlv-mail }
spec:
  selector: { app: dlv-mail }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
