# Ingress für digitallongview.com.
#   /api/contact.php  → dlv-mail (PHP-Endpoint, Kontaktformular + Funnel)
#   /                 → dlv-web  (statische Homepage)
# proxy-body-size: 8m erlaubt die Bild-Uploads des Funnels (Limit sonst 1 MB).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dlv-homepage
  namespace: web
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  rules:
    - host: digitallongview.com
      http:
        paths:
          - path: /api/contact.php
            pathType: Exact
            backend:
              service:
                name: dlv-mail
                port: { number: 8080 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dlv-web
                port: { number: 80 }
  tls:
    - hosts: [digitallongview.com]
      secretName: dlv-web-tls
