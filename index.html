<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Digital Longview — Die Digitalagentur für Raum, Zeit und Kultur. Ist gerade in Entstehung." />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#f7eced" />
    <meta name="color-scheme" content="light" />

    <!-- Open Graph / Social. og:url + og:image (jeweils ABSOLUTE URL) ergänzen, sobald die Domain steht. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Digital Longview" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:title" content="Digital Longview — ist gerade in Entstehung!" />
    <meta property="og:description" content="Die Digitalagentur für Raum, Zeit und Kultur. Ist gerade in Entstehung." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Digital Longview — ist gerade in Entstehung!" />
    <meta name="twitter:description" content="Die Digitalagentur für Raum, Zeit und Kultur. Ist gerade in Entstehung." />
    <!-- Fonts werden lokal via @font-face in src/index.css geladen (woff2, font-display:swap).
         Nur das oberhalb der Falz genutzte Satoshi-Variable wird vorgeladen, damit es
         nicht mit dem Hero um Bandbreite konkurriert. Kein render-blockierendes CDN mehr. -->
    <link
      rel="preload"
      href="/fonts/satoshi/Satoshi-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Digital Longview — ist gerade in Entstehung!</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
