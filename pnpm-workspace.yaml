# Supply-Chain-Policy dieses Setups: Für jedes Paket mit Install-/Build-Script ist
# eine explizite Entscheidung nötig (sonst bricht `pnpm install` mit
# ERR_PNPM_IGNORED_BUILDS ab).
#
# sharp ist nur Dev-Tooling für scripts/convert-images.mjs (Bild-Pipeline), läuft
# mit vorkompilierten Binaries und wird vom Deploy-Build (`pnpm build`) gar nicht
# aufgerufen — sein Build-Script wird daher NICHT benötigt: false.
allowBuilds:
  sharp: false
