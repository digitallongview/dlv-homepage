# Digital Longview — nginx-Konfiguration für das statische `dist/`-Deploy.
#
# Aktiviert: Auslieferung der vom Build erzeugten Precompression (.br/.gz, siehe
# scripts/precompress.mjs) + sinnvolle Cache-Header.
#
# WICHTIG:
#  - `brotli_static` benötigt das ngx_brotli-Modul — das ist NICHT in Stock-nginx
#    enthalten und muss separat einkompiliert/installiert werden. `gzip_static`
#    ist im Standard-nginx vorhanden (ngx_http_gzip_static_module, ggf. aktivieren).
#  - Verifizieren nach dem Deploy:
#      curl -s -H 'Accept-Encoding: br' -I https://DEINE-DOMAIN/assets/<hash>.js | grep -i content-encoding
#    → muss `content-encoding: br` zeigen.
#  - rsync muss die .br/.gz-Geschwister mit übertragen (Standard-`-a` tut das).

server {
  listen 443 ssl http2;
  server_name digitallongview.example;          # anpassen
  root /var/www/dlv-landing;                     # = Deploy-Ziel des rsync (anpassen)
  index index.html;

  gzip_static  on;   # liefert vorkomprimierte .gz aus
  brotli_static on;  # liefert vorkomprimierte .br aus (ngx_brotli nötig)

  # 1) Content-hashed Build-Bundles (…-XXXXXXXX.js / .css) → 1 Jahr, immutable.
  #    Bewusst per Hash-Regex statt pauschal /assets/, weil dort auch unhashte
  #    Bilder/Fonts liegen (die dürfen NICHT immutable sein).
  location ~* "-[A-Za-z0-9_-]{8,}\.(?:js|css)$" {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # 2) Unhashte Medien & Fonts → 30 Tage (Name bleibt bei Updates gleich).
  location ~* \.(?:woff2|glb|webp|png|jpe?g|svg|pdf)$ {
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  # 3) HLS: Manifest kurz, Segmente lang.
  location ~* \.m3u8$    { add_header Cache-Control "public, max-age=300"; }
  location ~* \.(ts|m4s)$ { add_header Cache-Control "public, max-age=31536000, immutable"; }

  # 4) index.html nie cachen → neue Deploys sind sofort sichtbar (sonst pinnen
  #    Clients auf bereits gelöschte Hash-Dateien → 404).
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # 5) SPA-Fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
