name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-homepage
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # GLB-Modelle liegen in Git LFS — ohne dies bekommt der Runner nur
          # die ~130-Byte-Pointer und /3d-assets/*.glb wäre auf dem Server 404.
          lfs: true

      # Version wird aus dem "packageManager"-Feld der package.json gelesen,
      # damit CI und lokale Umgebung garantiert dieselbe pnpm-Version nutzen.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy (rsync dist/ -> server)
        # HINWEIS: Ziel ist das SSH-Home (':'). `--delete` löscht dort alles, was nicht
        # in dist/ liegt — falls im Home noch anderes liegt, auf einen expliziten Docroot
        # umstellen (z. B. ':/var/www/dlv-landing/', siehe docs/nginx-snippet.conf).
        # --skip-compress: bereits komprimierte/Medien-Dateien nicht nochmal per -z packen.
        run: |
          rsync -az --delete --delete-after --chmod=D755,F644 \
            --skip-compress=br/gz/woff2/webp/png/jpg/jpeg/glb/mp4/m4s/ts/pdf \
            -e "ssh -i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:"
